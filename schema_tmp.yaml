            schema:
              $ref: '#/components/schemas/PropertyTagsReplaceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PropertyTagsReplaceRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: Массив тегов [{id, tag_name}, ...]
