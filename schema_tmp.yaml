servers:
- url: https://realline.cardeurope.ru
  description: Production server
- url: http://localhost:8000
  description: Development server
tags:
- name: Accounts — авторизация
  description: POST /register/ (заявка с формы), POST /login/, POST /token/refresh/
    — JWT.
- name: Accounts — профиль
  description: Профиль агента и смена пароля
- name: Accounts — объекты
  description: 'Объекты агента: GET/POST список, GET/PUT/PATCH/DELETE карточка; POST
    multipart/form-data или JSON.'
- name: Каталог
  description: Справочники районов и шоссе (GET), публичный список объектов с фильтрами.
- name: Сайт — регионы
  description: Города РФ в админке/сидах. GET /api/v1/site/regions/?name=… GET /api/v1/site/geo/
    — place_name по lat/lon (OSM Nominatim) или демо по IP.
- name: Сайт — баннеры
  description: Слайды главной страницы. GET /api/v1/site/hero-slides/
- name: Сайт — преимущества
  description: Карточки «Почему мы». GET /api/v1/site/advantages/
- name: Сайт — услуги
  description: Список карточек GET /api/v1/site/services/; полная страница услуги
    GET /api/v1/site/services/{id}/.
- name: Сайт — FAQ
  description: Частые вопросы и ответы. GET /api/v1/site/faq/
- name: Сайт — блог
  description: 'Статьи: список и деталь по slug. GET /api/v1/site/articles/'
- name: Сайт — команда
  description: Сотрудники. GET /api/v1/site/team/
- name: Сайт — отзывы
  description: Отзывы клиентов. GET /api/v1/site/reviews/
- name: Сайт — контакты
  description: Телефон, email, адрес, соцсети. GET /api/v1/site/contacts/
- name: Сайт — консультации
  description: Заявка с формы «Получить консультацию». POST /api/v1/site/consultation/
    без JWT.
- name: Accounts — витрина (пользователь)
  description: Избранное и сравнение для **авторизованного** пользователя (JWT). Только
    опубликованные объекты из каталога.
- name: Accounts — уведомления
  description: 'Уведомления агента об **отклонении** объекта модератором: GET список
    и GET по id (при открытии детали **`is_seen`** становится true). Создание записей
    — только из **админки**.'
