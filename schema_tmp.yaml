      description: |-
        **DELETE** по пути с **`listing_id` в URL** — это **первичный ключ объекта** `PropertyListing`, а не внутренний id записи избранного.

        **204** — удалено; **404** — такой объект не был в избранном.
      summary: 'Избранное: убрать объект'
      parameters:
      - in: path
        name: listing_id
        schema:
          type: integer
        required: true
      tags:
      - Accounts — витрина (пользователь)
      security:
