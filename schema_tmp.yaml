  /api/v1/accounts/register/:
    post:
      operationId: v1_accounts_register_create
      description: |-
        **Назначение:** приём заявки от потенциального агента с публичной формы («стать партнёром» / регистрация).

        **Доступ:** без токена. Тело **JSON**: имя, телефон, флаг согласия на обработку персональных данных (`personal_data_consent`, должен быть `true` при действующей политике).

        **Побочный эффект:** в таблице заявок создаётся одна запись; **учётная запись пользователя не создаётся** автоматически. После проверки менеджер в **админке Django** создаёт пользователя агента и выдаёт логин/пароль.

        **Ответ:** HTTP 201, поля `id` заявки и человекочитаемое сообщение для экрана успеха.
      summary: Регистрация / заявка (форма у экрана входа)
      tags:
      - Accounts — авторизация
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRequestCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AgentRequestCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AgentRequestCreateRequest'
          '*/*':
            schema:
              $ref: '#/components/schemas/AgentRequestCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          description: Заявка принята; в ответе id и текст для пользователя.
  /api/v1/accounts/token/refresh/:
    post:
      operationId: v1_accounts_token_refresh_create
      description: |-
        **Назначение:** получить новый **access**-токен без повторного ввода пароля, пока действителен **refresh**.

        **Тело JSON:** объект с полем **`refresh`** — строка refresh-токена, выданная при логине.

        **Ответ:** новый **access** (и при настройках SimpleJWT может вращаться refresh — см. фактический JSON). Используйте новый access в заголовке `Authorization: Bearer ...` для всех последующих запросов.
      summary: Обновить access-токен
      tags:
      - Accounts — авторизация
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          '*/*':
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
