        **Доступ:** публично, **без JWT**. Все тексты, изображения и порядок записей настраиваются в **админ-панели Django** (приложение сайта). Неактивные записи (`is_active=False` и аналоги) в выдачу не попадают там, где это предусмотрено моделью.

        **Назначение:** подставить человекочитаемое название места для виджета «ваш регион».

        - **Пара `lat` + `lon`:** обратное геокодирование через **OpenStreetMap Nominatim**; в ответе `place_name`, `full_address`, `country_code`. Требуется исходящий интернет с сервера.
        - **Без координат:** демонстрационный режим — координаты генерируются от IP, подпись города фиктивная (РФ).

        Справочник **`SiteRegion`** этим методом **не читается** — только внешняя геослужба или демо.
      summary: 'Геолокация: название места по координатам или демо по IP'
      parameters:
      - in: query
        name: lat
        schema:
          type: number
          format: double
        description: Широта WGS84 (вместе с `lon`).
      - in: query
        name: lon
        schema:
          type: number
          format: double
        description: Долгота WGS84 (вместе с `lat`).
      tags:
      - Сайт — регионы
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteGeoDetect'
          description: ''
        '400':
          description: Некорректные lat/lon
  /api/v1/site/hero-slides/:
    get:
      operationId: v1_site_hero_slides_list
      description: |-
        **Доступ:** публично, **без JWT**. Все тексты, изображения и порядок записей настраиваются в **админ-панели Django** (приложение сайта). Неактивные записи (`is_active=False` и аналоги) в выдачу не попадают там, где это предусмотрено моделью.

        **Назначение:** элементы карусели / hero-блока на главной (изображение, заголовок, ссылка и т.д.).

        **Фильтр (опционально):** `site_region` (ID) или `site_region_slug` (slug) — оставить слайды для конкретного региона. Если нужно добавить «общие» слайды (где регион не задан) — передайте `include_global=1`.
        Если переданы оба (`site_region` и `site_region_slug`) — приоритет у `site_region`.
      summary: Слайды / баннеры главной
      parameters:
      - in: query
        name: include_global
        schema:
          type: integer
        description: Если `1`, то вместе с региональными вернуть и «общие» слайды
          (где `site_region` не задан).
      - in: query
        name: site_region
        schema:
          type: integer
        description: ID региона (`SiteRegion.id`).
      - in: query
        name: site_region_slug
        schema:
          type: string
        description: Slug региона (`SiteRegion.slug`). По умолчанию возвращаются только
          слайды этого региона.
      tags:
      - Сайт — баннеры
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HeroSlide'
          description: ''
  /api/v1/site/regions/:
