        **Сравнение** — до **10** опубликованных объявлений на пользователя. При попытке добавить сверх лимита — **HTTP 400** с текстом причины. Повторное добавление того же id не дублирует запись (идемпотентно возвращается текущая карточка).

        Обязателен **JWT**. Формат карточек такой же, как в каталоге.
      summary: 'Сравнение: добавить объект'
