  /api/v1/accounts/properties/published/:
    get:
      operationId: v1_accounts_properties_published_list
      description: |-
        **Алиас витрины** под префиксом `/properties/published/`.

        Полностью совпадает с **`GET .../catalog/properties/`**: те же поля, **те же query-фильтры** (см. описание каталога и подсказки к параметрам в Swagger), пагинация `limit`/`offset`, сортировка по дате создания. В выборку попадают объекты **всех** агентов только со статусом **«Опубликован»**.

        **Зачем отдельный путь:** удобно вызывать из кода кабинета рядом с `GET .../properties/` (список **своих** объявлений с любым статусом), не смешивая URL витрины и ЛК.

        JWT опционален; с токеном — поля **`is_favourite`** и **`is_compare`**.
      summary: Все опубликованные объявления (витрина)
      parameters:
      - in: query
        name: actual_offers
        schema:
          type: boolean
        description: '`true` — объект отмечен для блока «Актуальные предложения» на
          главной.'
      - in: query
        name: area_max
        schema:
          type: number
        description: Максимальная площадь дома/объекта, м².
      - in: query
        name: area_min
        schema:
          type: number
        description: Минимальная площадь дома/объекта, м².
      - in: query
        name: category
        schema:
          type: number
        description: ID категории из GET /catalog/categories/.
      - in: query
        name: category_slug
        schema:
          type: string
        description: Тот же выбор категории по slug (`new_building`, `land_plot`,
          …), регистр не важен.
      - in: query
        name: distance_to_mkad_max
        schema:
          type: number
        description: Не дальше N км от МКАД (поле объекта distance_to_mkad_km ≤ N).
      - in: query
        name: district
        schema:
          type: number
        description: ID района из GET /catalog/districts/.
      - in: query
        name: forest_access
        schema:
          type: boolean
        description: При `true` — только объекты с тегом «С выходом в Лес».
      - in: query
        name: has_asphalt_roads
        schema:
          type: boolean
        description: Асфальтированные дороги на территории/посёлке.
      - in: query
        name: has_guarded_territory
        schema:
          type: boolean
        description: Охраняемая территория.
      - in: query
        name: has_street_lighting
        schema:
          type: boolean
        description: Уличное освещение.
      - in: query
        name: highway
        schema:
          type: number
        description: ID шоссе из GET /catalog/highways/.
      - in: query
        name: land_area_max
        schema:
          type: number
        description: Максимальная площадь участка, сотки.
      - in: query
        name: land_area_min
        schema:
          type: number
        description: Минимальная площадь участка, сотки.
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: near_public_transport
        schema:
          type: boolean
        description: Остановка общественного транспорта рядом.
      - in: query
        name: near_railway
        schema:
          type: boolean
        description: При `true` — только объекты с тегом «Ж/д станция рядом».
      - in: query
        name: near_school_kindergarten
        schema:
          type: boolean
        description: Школа и детский сад рядом.
      - in: query
        name: near_shops
        schema:
          type: boolean
        description: Магазины рядом.
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: query
        name: price_max
        schema:
          type: number
        description: Максимальная цена объекта, ₽.
      - in: query
        name: price_min
        schema:
          type: number
        description: Минимальная цена объекта, ₽.
      - in: query
        name: promo
        schema:
          type: boolean
        description: При `true` — только объекты с тегом «Акция» (регистр тега не
          важен).
      - in: query
        name: property_type
        schema:
          type: string
          x-spec-enum-id: b7cf1b80aeddc86c
          title: Тип объекта (legacy)
          enum:
          - apartment
          - commercial
          - house
          - land
          - other
        description: |-
          Тип объекта для фильтра: `land`, `house`, `apartment`, `commercial`, `other`.

          * `land` - Земельные участки
          * `house` - Дом
          * `apartment` - Квартира
          * `commercial` - Коммерческая
          * `other` - Другое
      - in: query
        name: start_sales
        schema:
          type: boolean
        description: При `true` — только объекты с тегом «Старт продаж».
      tags:
      - Accounts — объекты
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPropertyListingList'
          description: ''
  /api/v1/accounts/properties/published/{id}/:
    get:
      operationId: v1_accounts_properties_published_retrieve
      description: |-
        **Алиас карточки витрины:** `GET .../properties/published/{id}/`.

        Логика как у **`GET .../catalog/properties/{id}/`**: только статус **«Опубликован»**, иначе **404**. Опциональный JWT даёт **`is_favourite`** / **`is_compare`**.

        **Не путать** с **`GET .../properties/{id}/`** (кабинет агента): там доступ **только владельцу** и допускаются любые статусы (модерация, отклонён и т.д.).
      summary: Карточка опубликованного объекта (витрина)
