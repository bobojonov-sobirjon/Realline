  /api/v1/accounts/profile/favorites/add/:
    post:
      operationId: v1_accounts_profile_favorites_add_create
      description: |-
        **POST** с телом `{"property_listing": <id>}`. Создаёт связь пользователь–объект; если уже в избранном — **200** и актуальная карточка, если новая — **201**.

        **Избранное** привязано к учётной записи агента. Обязателен **JWT**.

        В списке и при добавлении возвращаются **полные карточки** как в каталоге (`PropertyListingSerializer`: фото, теги, район, цена и т.д.). В избранное **можно добавить только опубликованный** объект; неопубликованный id даст ошибку при получении полной карточки из витрины.

        Порядок элементов в **GET** — от новых добавлений к старым.
      summary: 'Избранное: добавить объект'
      tags:
      - Accounts — витрина (пользователь)
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingIdWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ListingIdWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ListingIdWriteRequest'
          '*/*':
            schema:
              $ref: '#/components/schemas/ListingIdWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyListing'
          description: ''
  /api/v1/accounts/properties/:
    get:
      operationId: v1_accounts_properties_list
      description: |-
        **Назначение:** список объявлений **текущего агента** (владелец = пользователь из JWT).

        **Авторизация:** обязателен **Bearer access-токен** (роль агента с флагом подтверждения в админке).

        **Статусы:** здесь видны **все** ваши карточки — «на модерации», «опубликован», «отклонён» — в отличие от публичного каталога, где только опубликованные.

        **Query-фильтры личного списка** (`GET`, только свои объекты агента):
        - **`status`** — `moderation` (на модерации), `published` (опубликован), `rejected` (отклонён). Без параметра возвращаются объекты **всех** статусов.
        - **`category`** — фильтр по **id** категории витрины (`category_id`), как в справочнике категорий.
        - **`category_slug`** — фильтр по **slug** категории (точное совпадение без учёта регистра).
        - **`actual_offers`** — `true` / `false`: только объекты с флагом «Актуальные предложения» или без него.

        Пагинация: **`limit`**, **`offset`**.

        **Публичная витрина** (объекты всех агентов, только опубликованные): `GET .../catalog/properties/`, `GET .../properties/published/`; карточка: `GET .../catalog/properties/{id}/` или `GET .../properties/published/{id}/`.
      summary: Список моих объектов
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      tags:
      - Accounts — объекты
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPropertyListingList'
          description: ''
    post:
      operationId: v1_accounts_properties_create
      description: |-
        **Назначение:** создание новой карточки недвижимости от имени вошедшего агента. После успешного сохранения объект обычно получает статус **«На модерации»** до проверки администратором.

        **Рекомендуется `multipart/form-data`:** удобно прикреплять файлы. Также поддерживается `application/json` (без загрузки файлов или с URL вне этого API).

        - Текстовые поля как в форме на сайте.
        - **images** — одно или несколько полей с именем `images` (несколько файлов).
        - **tags** — массив **строк**, как **images**: в Swagger «Add string item» / повтор поля `tags` в form-data; формат JSON в теле: `["тег1","тег2"]` или `[{"tag_name":"имя"}]`. Переданный набор задаёт **текущие** теги объекта (полная замена из этого запроса для поля `tags`). Отдельно только теги: `PUT /properties/{id}/tags/`.

        Для попадания в фильтры публичного каталога (`GET .../catalog/properties/`) добавьте в `tags` **точно такие** строки (как в справочнике на backend; при поиске регистр не важен):
        - `Акция` — фильтр `promo=true`
        - `Старт продаж` — `start_sales=true`
        - `С выходом в Лес` — `forest_access=true`
        - `Ж/д станция рядом` — `near_railway=true`
        Любые другие имена тегов тоже можно передавать — они просто не привязаны к этим query-параметрам.

        - **category_id** — обязательно при создании; список: `GET .../catalog/categories/`. Вложенные объекты (JSON или строка JSON в `multipart`): **`residential_details`** (все категории кроме земли) и **`land_plot_details`** (только slug `land_plot`). При **PATCH** переданные поля внутри блока дополняют уже сохранённые.
        - **district_id**, **highway_id** — из публичных справочников `GET .../catalog/districts/` и `.../catalog/highways/`; **address** — только вручную (улица, дом).
        - **area** — площадь дома/объекта, м²; **land_area** — участок, сот.; **distance_to_mkad_km** — до МКАД, км; **lat**, **long** — широта и долгота для карты (WGS84; в БД хранятся как latitude / longitude).
        - Флаги посёлка/локации: `has_asphalt_roads`, `has_street_lighting`, `has_guarded_territory`, `near_shops`, `near_school_kindergarten`, `near_public_transport` (boolean).
        - Коммуникации по отдельности: `electricity_supply`, `water_supply`, `sewage_type`, `heating_type`, `internet_connection`; поле **communications** — краткое резюме строкой.
        - **property_type:** по возможности не передавайте — выставляется от **category_id**; иначе legacy: `land` | `house` | `apartment` | `commercial` | `other`.
      summary: Создать объект (отправка на модерацию)
      tags:
      - Accounts — объекты
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PropertyListingWriteRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyListingWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyListing'
          description: ''
  /api/v1/accounts/properties/{id}/:
    get:
      operationId: v1_accounts_properties_retrieve
      description: |-
        **Назначение:** получить одну карточку по **id** в контексте личного кабинета.

        **Доступ:** только **владелец** (агент-владелец записи); иначе **403/404**. JWT обязателен.

        В ответе полная структура как в каталоге: фото, теги, уникальный код объекта (формат RL- и четыре цифры), детали категории, плюс актуальный **status** и **rejection_reason** при отклонении.
      summary: Карточка объекта
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Accounts — объекты
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyListing'
          description: ''
    put:
      operationId: v1_accounts_properties_update
      description: |-
        **PUT:** заменить карточку целиком — передайте все обязательные и нужные поля модели записи. Удобно при формах «сохранить всё».

        То же тело, что и при создании: **multipart/form-data** или JSON. При **PUT** нужно передать полный набор полей; при **PATCH** — только изменённые. Если передать `images` (включая пустой список), старые фото заменяются; без поля `images` файлы не трогаются.

        Для попадания в фильтры публичного каталога (`GET .../catalog/properties/`) добавьте в `tags` **точно такие** строки (как в справочнике на backend; при поиске регистр не важен):
        - `Акция` — фильтр `promo=true`
        - `Старт продаж` — `start_sales=true`
        - `С выходом в Лес` — `forest_access=true`
        - `Ж/д станция рядом` — `near_railway=true`
        Любые другие имена тегов тоже можно передавать — они просто не привязаны к этим query-параметрам.
      summary: Полное обновление объекта
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Accounts — объекты
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PropertyListingUpdateRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyListingUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyListing'
          description: ''
    patch:
      operationId: v1_accounts_properties_partial_update
      description: |-
        **PATCH:** обновить только изменившиеся поля (и вложенные блоки `residential_details` / `land_plot_details` частично). Остальные значения на сервере сохраняются.

        То же тело, что и при создании: **multipart/form-data** или JSON. При **PUT** нужно передать полный набор полей; при **PATCH** — только изменённые. Если передать `images` (включая пустой список), старые фото заменяются; без поля `images` файлы не трогаются.

        Для попадания в фильтры публичного каталога (`GET .../catalog/properties/`) добавьте в `tags` **точно такие** строки (как в справочнике на backend; при поиске регистр не важен):
        - `Акция` — фильтр `promo=true`
        - `Старт продаж` — `start_sales=true`
        - `С выходом в Лес` — `forest_access=true`
        - `Ж/д станция рядом` — `near_railway=true`
        Любые другие имена тегов тоже можно передавать — они просто не привязаны к этим query-параметрам.
      summary: Частичное обновление объекта
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Accounts — объекты
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPropertyListingUpdateRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPropertyListingUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyListing'
          description: ''
    delete:
      operationId: v1_accounts_properties_destroy
      description: '**DELETE:** полное удаление объявления из базы. Связанные **изображения**
        и файлы с диска удаляются каскадно (в пределах модели). Операция **необратима**.
        Доступ только владельцу.'
      summary: Удалить объект
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Accounts — объекты
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Удалено
  /api/v1/accounts/properties/{id}/resubmit/:
    post:
      operationId: v1_accounts_properties_resubmit_create
      description: |-
        **POST** без тела. Владелец может вызвать после **отклонения** админом.

        Статус снова **«На модерации»**, поле **`rejection_reason`** очищается. Дальнейшее решение — в админке (повторная публикация или снова отклонение).
      summary: Повторно отправить на модерацию
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Accounts — объекты
      requestBody:
        content:
          application/json:
            schema:
