          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PropertyListingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PropertyListingRequest'
          '*/*':
            schema:
              $ref: '#/components/schemas/PropertyListingRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyListing'
          description: ''
  /api/v1/accounts/properties/{id}/tags/:
    put:
      operationId: v1_accounts_properties_tags_update
      description: |-
        **Назначение:** быстро обновить только маркетинговые **теги** (чипы на витрине) без остальных полей карточки.

        **Метод:** `PUT`. Тело JSON: `{"tags": ["лес", "дача"]}` или `multipart/form-data` с повторяющимся полем **`tags`**. Список имён задаёт **итоговый** набор: прежние теги объекта удаляются, создаются новые записи (в ответе у элементов будут **новые** `id`).

        **`{"tags": []}`** — удалить все теги у объекта.

        **Ответ:** массив `[{ "id", "tag_name" }, …]` в актуальном порядке. Некоторые имена тегов участвуют в фильтрах каталога (`promo`, `start_sales` и т.д.) — см. описание каталога.
