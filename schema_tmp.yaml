openapi: 3.0.3
info:
  title: Realline / RealEstateRus API
  version: v1
  description: REST API для агентов, публичного каталога и **контента сайта** (витрина).
    JWT (Bearer) для кабинета агента, избранного и сравнения. Эндпоинты **`/api/v1/site/`**
    — публично (GET), кроме POST заявки на консультацию.
  contact:
    name: API Support
    email: contact@snippets.local
  license:
    name: BSD License
paths:
  /api/v1/accounts/catalog/categories/:
    get:
      operationId: v1_accounts_catalog_categories_list
      description: |-
        **Назначение:** словарь типов объектов для форм и для фильтра каталога (`category`, `category_slug`).

        **Доступ:** публично, без авторизации. Пагинации нет — отдаётся полный активный справочник (сортировка: `sort_order`, затем название).

        **Поля:** `id`, `name`, `slug`, `sort_order`. При создании/редактировании объекта в API передавайте **`category_id`** = `id` из этого списка.

        **Важно:** если **slug** = `land_plot`, в карточке объекта используется блок **`land_plot_details`**; для всех остальных slug — общий блок **`residential_details`** (новостройки, вторичка, загород и т.д.).
      summary: Справочник категорий витрины
      tags:
      - Каталог
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PropertyCategoryRef'
          description: ''
  /api/v1/accounts/catalog/districts/:
    get:
      operationId: v1_accounts_catalog_districts_list
      description: |-
        **Назначение:** подсказка для поля «Район» в формах и фильтр **`district`** в каталоге (значение = **id** записи).

        **Доступ:** публично. Формат ответа: массив `{ id, name }`. Список отсортирован по названию.

        В теле создания/обновления объекта передаётся **`district_id`**, не текст названия.

        **Фильтр по региону:** можно передать query-параметр **`region`** (или legacy **`country`**) со значением `moscow` или `saint_petersburg`.
      summary: Справочник районов
      parameters:
      - in: query
        name: country
        schema:
          type: string
        description: Alias для `region` (поддержка старого параметра).
      - in: query
        name: region
        schema:
          type: string
        description: 'Регион справочника: `moscow` или `saint_petersburg`.'
      tags:
      - Каталог
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DistrictRef'
          description: ''
  /api/v1/accounts/catalog/highways/:
    get:
      operationId: v1_accounts_catalog_highways_list
      description: |-
        **Назначение:** выбор шоссе при заполнении карточки и фильтр **`highway`** в каталоге.

        **Доступ:** публично. Ответ: `{ id, name }` для каждой записи.

        В API объекта поле **`highway_id`** — внешний ключ на `id` из этого списка; текст шоссе вручную не подставляется.

        **Фильтр по региону:** можно передать query-параметр **`region`** (или legacy **`country`**) со значением `moscow` или `saint_petersburg`.
      summary: Справочник шоссе
      parameters:
      - in: query
        name: country
        schema:
          type: string
        description: Alias для `region` (поддержка старого параметра).
      - in: query
        name: region
        schema:
          type: string
        description: 'Регион справочника: `moscow` или `saint_petersburg`.'
      tags:
      - Каталог
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HighwayRef'
          description: ''
  /api/v1/accounts/catalog/properties/:
    get:
      operationId: v1_accounts_catalog_properties_list
      description: |-
        **Назначение:** публичная витрина объявлений о недвижимости. В ответе только карточки со статусом **«Опубликован»** (после одобрения в админке). Черновики и объекты «на модерации» или «отклонён» в этом списке **никогда не отображаются**. Отдельная карточка: `GET .../catalog/properties/{id}/` — то же правило: неопубликованный id даст **404**.

        **Аутентификация:** JWT **не обязателен** для чтения списка. Если передать заголовок **Authorization: Bearer** с access-токеном, в каждом объекте будут актуальные поля **`is_favourite`** и **`is_compare`** для текущего пользователя. В Swagger UI нажмите **Authorize** и вставьте токен, иначе интерфейс может не прикрепить заголовок к запросу.

        **Сортировка:** по дате создания объявления, сначала новые (`-created_at`).

        **Пагинация (drf):** `limit` — размер страницы (по умолчанию из настроек), `offset` — смещение.

        ---
        **Query-фильтры** (все необязательны; условия объединяются логическим **И**):
        - **`category`** — числовой **id** категории из справочника `GET .../catalog/categories/`.
        - **`category_slug`** — то же по **slug** (`new_building`, `land_plot`, `suburban`, …); регистр не важен. Не используйте одновременно с `category`, если нужен один критерий.
        - **`property_type`** — унаследованный тип объекта для фильтра: `land`, `house`, `apartment`, `commercial`, `other`. Обычно совпадает с категорией, но может отличаться на старых данных.
        - **`district`** — **id** района из `GET .../catalog/districts/`.
        - **`highway`** — **id** шоссе из `GET .../catalog/highways/`.
        - **`area_min`**, **`area_max`** — диапазон площади дома/объекта в **м²** (поле `area` объекта ≥ min и/или ≤ max).
        - **`land_area_min`**, **`land_area_max`** — диапазон площади участка в **сотках**.
        - **`distance_to_mkad_max`** — не дальше указанного числа **км** от МКАД: `distance_to_mkad_km ≤ значение` (удобно для загорода).
        - **`price_min`**, **`price_max`** — цена объекта в **рублях** (включительно по переданным границам).
        - **`has_asphalt_roads`**, **`has_street_lighting`**, **`has_guarded_territory`**, **`near_shops`**, **`near_school_kindergarten`**, **`near_public_transport`** — булевы признаки инфраструктуры/посёлка; передайте `true` или `false`.
        - **`promo`**, **`start_sales`**, **`forest_access`**, **`near_railway`** — при **`true`** оставляются только объекты, у которых среди тегов есть строка (без учёта регистра): «Акция», «Старт продаж», «С выходом в Лес», «Ж/д станция рядом» соответственно.
        - **`actual_offers`** — при **`true`** только объекты с галочкой **«Актуальные предложения»** в админке (карусель на главной).

        Подсказки по тегам для агентов (при сохранении объекта) см. в описании создания объекта.
      summary: Каталог объявлений (витрина)
      parameters:
      - in: query
        name: actual_offers
        schema:
          type: boolean
        description: '`true` — объект отмечен для блока «Актуальные предложения» на
          главной.'
      - in: query
        name: area_max
        schema:
          type: number
        description: Максимальная площадь дома/объекта, м².
      - in: query
        name: area_min
        schema:
          type: number
        description: Минимальная площадь дома/объекта, м².
      - in: query
        name: category
        schema:
          type: number
        description: ID категории из GET /catalog/categories/.
      - in: query
        name: category_slug
        schema:
          type: string
        description: Тот же выбор категории по slug (`new_building`, `land_plot`,
          …), регистр не важен.
      - in: query
        name: distance_to_mkad_max
        schema:
          type: number
        description: Не дальше N км от МКАД (поле объекта distance_to_mkad_km ≤ N).
      - in: query
        name: district
        schema:
          type: number
        description: ID района из GET /catalog/districts/.
      - in: query
        name: forest_access
        schema:
          type: boolean
        description: При `true` — только объекты с тегом «С выходом в Лес».
      - in: query
        name: has_asphalt_roads
        schema:
          type: boolean
        description: Асфальтированные дороги на территории/посёлке.
      - in: query
        name: has_guarded_territory
        schema:
          type: boolean
        description: Охраняемая территория.
      - in: query
        name: has_street_lighting
        schema:
          type: boolean
        description: Уличное освещение.
      - in: query
        name: highway
        schema:
          type: number
        description: ID шоссе из GET /catalog/highways/.
      - in: query
        name: land_area_max
        schema:
          type: number
        description: Максимальная площадь участка, сотки.
      - in: query
        name: land_area_min
        schema:
          type: number
        description: Минимальная площадь участка, сотки.
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: near_public_transport
        schema:
          type: boolean
        description: Остановка общественного транспорта рядом.
      - in: query
        name: near_railway
        schema:
          type: boolean
        description: При `true` — только объекты с тегом «Ж/д станция рядом».
      - in: query
        name: near_school_kindergarten
        schema:
          type: boolean
        description: Школа и детский сад рядом.
      - in: query
        name: near_shops
        schema:
          type: boolean
        description: Магазины рядом.
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: query
        name: price_max
        schema:
          type: number
        description: Максимальная цена объекта, ₽.
      - in: query
        name: price_min
        schema:
          type: number
        description: Минимальная цена объекта, ₽.
      - in: query
        name: promo
        schema:
          type: boolean
        description: При `true` — только объекты с тегом «Акция» (регистр тега не
          важен).
      - in: query
        name: property_type
        schema:
          type: string
          x-spec-enum-id: b7cf1b80aeddc86c
          title: Тип объекта (legacy)
          enum:
          - apartment
          - commercial
          - house
          - land
          - other
        description: |-
          Тип объекта для фильтра: `land`, `house`, `apartment`, `commercial`, `other`.

          * `land` - Земельные участки
          * `house` - Дом
          * `apartment` - Квартира
          * `commercial` - Коммерческая
          * `other` - Другое
      - in: query
        name: start_sales
        schema:
          type: boolean
        description: При `true` — только объекты с тегом «Старт продаж».
      tags:
      - Каталог
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPropertyListingList'
          description: ''
  /api/v1/accounts/catalog/properties/{listing_pk}/units/:
    get:
      operationId: v1_accounts_catalog_properties_units_list
      description: |-
        **Назначение:** список лотов/квартир внутри одного объекта ЖК (блок «Планировка и цены» на сайте). Родительский объект определяется **`listing_pk`** в URL (тот же id, что в каталоге).

        **Доступ:** публично, без JWT. Родительское объявление **должно быть опубликовано**; иначе ответ **404** (как для `GET .../catalog/properties/{id}/`). Если объект опубликован, но лотов в базе нет — **200** и пустой список в пагинации.

        **Пагинация:** `limit`, `offset`.

        **Query-фильтры** (опционально, логическое **И**; те же имена, что и у `.../units/summary/`):
        - **`q`** — текстовый поиск по полям: подпись карточки (`title`), корпус, группа планировки (`layout_label`), отделка (`finishing`). Подстрока, без учёта регистра.
        - **`building`** — корпус/литер: вхождение подстроки в поле «корпус».
        - **`layout_label`** — группа аккордеона на фронте (например «Студия», «2-комнатная»): **точное** совпадение строки без учёта регистра.
        - **`rooms`** — точное число комнат (для студии см. `is_studio`).
        - **`rooms_min`**, **`rooms_max`** — диапазон по числу комнат.
        - **`is_studio`** — `true` / `false`: только студии или только не-студии.
        - **`price_min`**, **`price_max`** — цена лота в **рублях**.
        - **`area_min`**, **`area_max`** — общая площадь лота **м²** (`total_area`).
        - **`kitchen_min`**, **`kitchen_max`** — площадь кухни **м²**.
        - **`floor`** — точный номер этажа.
        - **`floor_min`**, **`floor_max`** — диапазон этажей.
        - **`finishing`** — подстрока в описании отделки лота.
        - **`is_assignment`** — переуступка: `true` / `false`.
        - **`is_two_level`** — двухуровневая планировка.
        - **`has_master_bedroom`** — наличие мастер-спальни.
        - **`is_apartments_legal`** — юридически апартаменты / соответствующий признак в карточке.

        Поле **`price_per_sqm`** в ответе заполняется на сервере при сохранении лота, если заданы цена и площадь.
      summary: Лоты ЖК («Планировка и цены»)
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: path
        name: listing_pk
        schema:
          type: integer
        required: true
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      tags:
      - Каталог
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPropertyListingUnitList'
          description: ''
        '404':
          description: Объект не в каталоге
  /api/v1/accounts/catalog/properties/{listing_pk}/units/summary/:
    get:
      operationId: v1_accounts_catalog_properties_units_summary_list
      description: |-
        **Назначение:** агрегированная сводка по лотам одного опубликованного объекта, сгруппированная по полю **`layout_label`** (одна строка аккордеона на сайте — например «1-комнатная»). Для каждой группы возвращаются: **`count`** (число лотов), **`area_min`** / **`area_max`** (по общей площади), **`price_min`** / **`price_max`** (цена), **`price_per_sqm_min`** (минимальная цена за м² среди лотов группы).

        **Доступ и родитель** — как у `GET .../units/`: только **опубликованный** `listing_pk`, иначе **404**.

        **Фильтры:** те же query-параметры, что у списка лотов. Сводка считается **после** применения фильтров (т.е. отражает только отобранное множество лотов).

        Лоты с пустым `layout_label` попадают в одну группу с пустой меткой.
      summary: Сводка лотов по группам планировки
      parameters:
      - in: path
        name: listing_pk
        schema:
          type: integer
        required: true
      tags:
      - Каталог
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PropertyListingUnitSummaryRow'
          description: ''
        '404':
          description: Объект не в каталоге
  /api/v1/accounts/catalog/properties/{id}/:
    get:
      operationId: v1_accounts_catalog_properties_retrieve
      description: |-
        **Назначение:** одна карточка недвижимости для публичного сайта по числовому **id**.

        **Доступ:** публично; JWT **не обязателен**. Если передать Bearer-токен, в теле будут **`is_favourite`** и **`is_compare`** для текущего пользователя (как в списке каталога).

        **Статус:** только **«Опубликован»**. Объект на модерации, отклонённый или удалённый — **404**, чтобы нельзя было увидеть черновик по прямой ссылке.

        Структура ответа совпадает с элементом списка `GET .../catalog/properties/`: изображения, теги, район, категория, блоки `residential_details` / `land_plot_details` при наличии.
      summary: Карточка объекта на витрине
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Каталог
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyListing'
          description: ''
        '404':
          description: Нет в каталоге (не опубликован или не существует)
  /api/v1/accounts/change-password/:
    post:
      operationId: v1_accounts_change_password_create
      description: |-
        **Назначение:** установить новый пароль для **вошедшего** пользователя без ввода старого пароля (сценарий «восстановление/смена из кабинета» при доверенной сессии).

        **Авторизация:** Bearer JWT.

        **Тело:** JSON или form — **`new_password`**, **`new_password_confirm`** (должны совпадать). Действуют стандартные **валидаторы паролей Django** (длина, сложность и т.д.).

        После успеха используйте новый пароль при следующем **логине**.
      summary: Смена пароля
      tags:
      - Accounts — профиль
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: Пароль обновлён; дальнейшие запросы — с новым паролем при логине.
  /api/v1/accounts/login/:
    post:
      operationId: v1_accounts_login_create
      description: |-
        **Назначение:** получить пару **access** / **refresh** JWT для вызовов защищённых методов API (кабинет агента, избранное, сравнение).

        **Тело JSON:** `username` (как при выдаче кабинета), `password`, `personal_data_consent`: **true** (единоразовое подтверждение политики при входе).

        **Условие:** у пользователя в админке должен быть флаг **«Подтверждён администратором»** (`is_verified`); иначе вход будет отклонён.

        **Ответ:** короткоживущий **access** (заголовок `Authorization: Bearer ...`) и **refresh** для продления сессии через `POST .../token/refresh/`; при необходимости дополнительные поля профиля — см. схему ответа сериализатора.
      summary: Вход агента (JWT)
      tags:
      - Accounts — авторизация
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentTokenObtainRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AgentTokenObtainRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AgentTokenObtainRequest'
          '*/*':
            schema:
              $ref: '#/components/schemas/AgentTokenObtainRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/v1/accounts/notifications/listing-rejections/:
    get:
      operationId: v1_accounts_notifications_listing_rejections_list
      description: 'Уведомления для **текущего агента** по его объектам, отклонённым
        модератором. Сортировка: **сначала новые** (`created_at` по убыванию). Поле
        **`is_seen`** — просмотрел ли агент запись; при открытии **GET …/{id}/** становится
        `true`.'
      summary: Список уведомлений об отклонении объектов
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      tags:
      - Accounts — уведомления
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPropertyListingRejectionNoticeList'
          description: ''
  /api/v1/accounts/notifications/listing-rejections/{id}/:
    get:
      operationId: v1_accounts_notifications_listing_rejections_retrieve
